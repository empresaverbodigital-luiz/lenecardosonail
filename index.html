<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#b76e79">
<title>Agenda Lene Cardoso Nail Designer</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
:root{
  --bg:#faf6f4; --card:#ffffff; --text:#221d1e; --muted:#96888a; --line:#f0e3e0;
  --accent:#b76e79; --accent-soft:#f6dfe2; --nude:#ead9ce; --rosa:#f9edef;
  --ok:#5fa877; --warn:#d9a444; --danger:#c25b5b; --shadow:0 4px 18px rgba(183,110,121,.10);
}
[data-theme="dark"]{
  --bg:#1c1618; --card:#282124; --text:#f4ecea; --muted:#a89599; --line:#3a3034;
  --accent:#d38f9a; --accent-soft:#40303a; --nude:#3a2f2c; --rosa:#332a2d;
  --shadow:0 4px 18px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;transition:background .3s}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--text);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
label{display:block;font-size:12.5px;color:var(--muted);margin:12px 0 5px;font-weight:600;letter-spacing:.02em}
h2{font-size:20px;font-weight:700;letter-spacing:-.01em}
h3{font-size:15px;font-weight:700}
.hidden{display:none!important}

/* ===== LOGIN ===== */
#login{position:fixed;inset:0;background:linear-gradient(160deg,var(--rosa),var(--bg) 60%);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column;padding:24px}
.login-card{background:var(--card);border-radius:24px;box-shadow:var(--shadow);padding:36px 30px;max-width:360px;width:100%;text-align:center}
.logo-circle{width:74px;height:74px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#e3a5ae);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:34px;color:#fff}
.login-card h1{font-size:21px;margin-bottom:4px}
.login-card p{color:var(--muted);font-size:13px;margin-bottom:22px}

/* ===== SHELL ===== */
#app{display:none;min-height:100%}
#app.on{display:block}
.topbar{position:sticky;top:0;z-index:30;background:var(--bg);padding:14px 18px 10px;display:flex;align-items:center;gap:12px}
.topbar .tt{flex:1;min-width:0}
.topbar h1{font-size:18px;font-weight:700}
.topbar .sub{font-size:11.5px;color:var(--muted)}
.icon-btn{width:40px;height:40px;border-radius:13px;background:var(--card);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
main{padding:4px 18px 110px;max-width:1060px;margin:0 auto}
@media(min-width:900px){
  body{display:flex}
  #app.on{display:flex;width:100%}
  .sidenav{display:flex!important;flex-direction:column;width:220px;flex:none;padding:26px 14px;gap:4px;border-right:1px solid var(--line);min-height:100vh;position:sticky;top:0}
  .bottomnav{display:none!important}
  .content{flex:1;min-width:0}
}
.sidenav{display:none}
.sidenav .brand{font-weight:700;font-size:15px;padding:0 12px 18px;color:var(--accent)}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 14px;border-radius:13px;font-size:14px;font-weight:600;color:var(--muted);width:100%;text-align:left}
.nav-item.active{background:var(--accent-soft);color:var(--accent)}
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;z-index:40;padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
.bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--muted);padding:6px 2px;border-radius:10px;font-weight:600}
.bottomnav button.active{color:var(--accent)}
.bottomnav .ic{font-size:20px}

/* ===== CARDS/GRID ===== */
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
@media(min-width:700px){.g2-d4{grid-template-columns:repeat(4,1fr)}}
.card{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:16px}
.stat .num{font-size:22px;font-weight:800;margin-top:2px}
.stat .lb{font-size:11.5px;color:var(--muted);font-weight:600}
.stat .ic{font-size:18px}
.sec-title{display:flex;align-items:center;justify-content:space-between;margin:22px 0 10px}
.sec-title h2{font-size:16px}
.link-btn{color:var(--accent);font-size:13px;font-weight:700}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:14px;font-weight:700;font-size:14px;transition:transform .12s, opacity .2s}
.btn:active{transform:scale(.96)}
.btn-p{background:linear-gradient(135deg,var(--accent),#cf8b95);color:#fff;box-shadow:var(--shadow)}
.btn-s{background:var(--accent-soft);color:var(--accent)}
.btn-o{border:1.5px solid var(--line);color:var(--text)}
.btn-danger{background:#fbe9e9;color:var(--danger)}
[data-theme="dark"] .btn-danger{background:#42292b}
.btn-ok{background:#e7f3ea;color:var(--ok)}
[data-theme="dark"] .btn-ok{background:#25352a}
.btn-w{width:100%}
.btn-sm{padding:8px 13px;font-size:12.5px;border-radius:11px}
.fab{position:fixed;right:20px;bottom:86px;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#cf8b95);color:#fff;font-size:26px;box-shadow:0 8px 24px rgba(183,110,121,.4);z-index:35;display:flex;align-items:center;justify-content:center}
@media(min-width:900px){.fab{bottom:28px}}

/* ===== NEXT APPOINTMENT ===== */
.next-card{background:linear-gradient(135deg,var(--accent),#d29aa3);color:#fff;border-radius:20px;padding:18px;box-shadow:var(--shadow)}
.next-card .tag{font-size:11px;font-weight:700;opacity:.85;letter-spacing:.06em}
.next-card .nm{font-size:19px;font-weight:800;margin:4px 0 2px}
.next-card .dt{font-size:13px;opacity:.9}

/* ===== LISTS ===== */
.list-item{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid var(--line)}
.list-item:last-child{border-bottom:none}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex:none;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.li-main{flex:1;min-width:0}
.li-main .t{font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-main .s{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-end{text-align:right;flex:none}
.li-end .v{font-weight:800;font-size:14px}
.li-end .s{font-size:11px;color:var(--muted)}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:800;letter-spacing:.03em}

/* ===== AGENDA ===== */
.seg{display:flex;background:var(--card);border-radius:13px;padding:4px;box-shadow:var(--shadow);gap:2px}
.seg button{flex:1;padding:8px;border-radius:10px;font-weight:700;font-size:13px;color:var(--muted)}
.seg button.active{background:var(--accent);color:#fff}
.day-nav{display:flex;align-items:center;justify-content:space-between;margin:14px 0 10px}
.day-nav .dt{font-weight:800;font-size:15px;text-transform:capitalize}
.slot{display:flex;gap:10px;padding:2px 0}
.slot .hr{width:46px;flex:none;font-size:11.5px;color:var(--muted);padding-top:10px;text-align:right;font-weight:600}
.slot .sl-body{flex:1;min-height:44px;border-top:1px dashed var(--line);padding:3px 0}
.ag-block{border-radius:12px;padding:9px 12px;color:#fff;font-size:12.5px;font-weight:700;margin-bottom:3px;box-shadow:0 2px 8px rgba(0,0,0,.12);display:flex;justify-content:space-between;align-items:center;gap:8px;width:100%;text-align:left}
.ag-block .sub{font-weight:600;opacity:.85;font-size:11px;display:block}
.ag-free{color:var(--muted);font-size:11px;padding:12px 4px;width:100%;text-align:left;border-radius:10px}
.ag-free:hover{background:var(--accent-soft);color:var(--accent)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}
.cal-grid .wd{text-align:center;font-size:10.5px;color:var(--muted);font-weight:800;padding:4px 0}
.cal-cell{aspect-ratio:1;border-radius:12px;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;font-weight:600;gap:3px;box-shadow:var(--shadow)}
.cal-cell.off{opacity:.32;box-shadow:none;background:transparent}
.cal-cell.today{outline:2px solid var(--accent)}
.cal-cell.sel{background:var(--accent);color:#fff}
.dots{display:flex;gap:2px;height:5px}
.dots i{width:5px;height:5px;border-radius:50%;background:var(--accent)}
.cal-cell.sel .dots i{background:#fff}
.week-col{margin-bottom:14px}
.week-col .wc-h{font-size:12.5px;font-weight:800;color:var(--muted);margin-bottom:6px;text-transform:capitalize}

/* ===== CHARTS ===== */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-row .bl{width:86px;flex:none;font-size:11.5px;color:var(--muted);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-row .bt{flex:1;height:22px;background:var(--rosa);border-radius:8px;overflow:hidden}
.bar-row .bf{height:100%;background:linear-gradient(90deg,var(--accent),#d8a0a9);border-radius:8px;min-width:2px;transition:width .5s}
.bar-row .bv{width:70px;flex:none;text-align:right;font-size:11.5px;font-weight:800}
.vchart{display:flex;align-items:flex-end;gap:3px;height:120px;margin-top:10px}
.vchart .vc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0}
.vchart .vb{width:100%;background:linear-gradient(180deg,var(--accent),#dba7b0);border-radius:6px 6px 3px 3px;min-height:2px;transition:height .5s}
.vchart .vl{font-size:9px;color:var(--muted);font-weight:700}

/* ===== PROGRESS ===== */
.meta-bar{height:12px;background:var(--rosa);border-radius:10px;overflow:hidden;margin:8px 0 6px}
.meta-fill{height:100%;background:linear-gradient(90deg,var(--accent),#e0aab3);border-radius:10px;transition:width .6s}

/* ===== MODAL ===== */
#overlay{position:fixed;inset:0;background:rgba(30,20,22,.45);z-index:60;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(2px)}
#overlay.on{opacity:1;pointer-events:auto}
#sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--card);border-radius:24px 24px 0 0;max-height:88vh;overflow-y:auto;transform:translateY(105%);transition:transform .28s cubic-bezier(.2,.8,.25,1);padding:10px 20px calc(26px + env(safe-area-inset-bottom));box-shadow:0 -10px 40px rgba(0,0,0,.18)}
#sheet.on{transform:translateY(0)}
@media(min-width:900px){#sheet{left:50%;right:auto;bottom:auto;top:50%;width:480px;max-height:82vh;border-radius:22px;transform:translate(-50%,-46%) scale(.96);opacity:0}#sheet.on{transform:translate(-50%,-50%) scale(1);opacity:1}}
.sheet-handle{width:44px;height:5px;border-radius:4px;background:var(--line);margin:6px auto 14px}
.sheet-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chip-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.chip{padding:8px 14px;border-radius:20px;border:1.5px solid var(--line);font-size:12.5px;font-weight:700;color:var(--muted)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.color-dot{width:30px;height:30px;border-radius:50%;border:3px solid transparent;flex:none}
.color-dot.on{border-color:var(--text)}

/* ===== TOAST ===== */
#toast{position:fixed;left:50%;bottom:96px;transform:translate(-50%,20px);background:var(--text);color:var(--bg);padding:12px 22px;border-radius:14px;font-size:13.5px;font-weight:700;z-index:80;opacity:0;transition:all .3s;pointer-events:none;max-width:88vw;text-align:center}
#toast.on{opacity:1;transform:translate(-50%,0)}

/* ===== SEARCH ===== */
.searchbar{display:flex;align-items:center;gap:9px;background:var(--card);border-radius:14px;padding:11px 14px;box-shadow:var(--shadow);margin-bottom:14px}
.searchbar input{border:none;padding:0;border-radius:0;background:transparent}
.filter-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;margin-bottom:8px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-row .chip{flex:none}
.empty{text-align:center;color:var(--muted);padding:34px 10px;font-size:13.5px}
.empty .ic{font-size:34px;display:block;margin-bottom:8px}
.social-row{display:flex;gap:10px;margin-top:14px}
.social-row .btn{flex:1}
.wa{background:#25d366;color:#fff}
.ig{background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);color:#fff}
.divider{height:1px;background:var(--line);margin:16px 0}
.detail-kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.detail-kv .k{color:var(--muted);font-weight:600}
.detail-kv .v{font-weight:700;text-align:right}
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:16px}
@keyframes pop{0%{transform:scale(.92);opacity:0}100%{transform:scale(1);opacity:1}}
.card,.stat{animation:pop .25s ease}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="logo-circle">💅</div>
    <h1>Agenda Lene Cardoso</h1>
    <p>Nail Designer · Organize seus atendimentos e controle seus recebimentos em um só lugar.</p>
    <div id="login-body"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="sidenav" id="sidenav">
    <div class="brand">💅 Lene Cardoso</div>
  </nav>
  <div class="content">
    <header class="topbar">
      <div class="tt"><h1 id="tb-title">Dashboard</h1><div class="sub" id="tb-sub"></div></div>
      <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
      <button class="icon-btn" onclick="nav('config')">⚙️</button>
    </header>
    <main id="main"></main>
  </div>
  <nav class="bottomnav" id="bottomnav"></nav>
  <button class="fab" onclick="openAtModal()" id="fab">＋</button>
</div>

<div id="overlay" onclick="closeSheet()"></div>
<div id="sheet"></div>
<div id="toast"></div>

<script>
/* ================= DATA ================= */
const LS_KEY='lene_agenda_v1';
const DEFAULT_SERVICES=[
 {id:'s1',nome:'Alongamento',preco:120,dur:150,cor:'#b76e79'},
 {id:'s2',nome:'Banho em gel',preco:90,dur:120,cor:'#c98f6b'},
 {id:'s3',nome:'Manutenção',preco:80,dur:90,cor:'#8f7fb8'},
 {id:'s4',nome:'Esmaltação em gel',preco:60,dur:60,cor:'#d96b9a'},
 {id:'s5',nome:'Blindagem',preco:70,dur:75,cor:'#6b9ac9'},
 {id:'s6',nome:'Spa dos pés',preco:75,dur:60,cor:'#5fa877'},
 {id:'s7',nome:'Pedicure',preco:45,dur:45,cor:'#d9a444'},
 {id:'s8',nome:'Manicure',preco:40,dur:45,cor:'#c25b5b'},
 {id:'s9',nome:'Decoração',preco:25,dur:30,cor:'#9a6bd9'},
 {id:'s10',nome:'Remoção',preco:35,dur:40,cor:'#7d8a96'}
];
let DB=load();
function load(){
  try{const d=JSON.parse(localStorage.getItem(LS_KEY));if(d&&d.config)return d;}catch(e){}
  return {clientes:[],servicos:DEFAULT_SERVICES.slice(),ats:[],bloqueios:[],espera:[],
    config:{meta:3000,tema:'light',pin:'',horaIni:'08:00',horaFim:'19:00',notif:false,
      whats:'5595988042246',insta:'lenecardosonail'}};
}
function save(){localStorage.setItem(LS_KEY,JSON.stringify(DB));}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

/* ================= HELPERS ================= */
const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
const money=v=>'R$ '+(+v||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
const pad=n=>String(n).padStart(2,'0');
const todayStr=()=>{const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());};
const nowHM=()=>{const d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes());};
function dstr(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function parseD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fmtD(s,opts){return parseD(s).toLocaleDateString('pt-BR',opts||{day:'2-digit',month:'2-digit',year:'numeric'});}
function fmtDLong(s){return parseD(s).toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});}
const toMin=h=>{const[a,b]=h.split(':').map(Number);return a*60+b;};
const toHM=m=>pad(Math.floor(m/60))+':'+pad(m%60);
const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const onlyDigits=s=>String(s||'').replace(/\D/g,'');
function cli(id){return DB.clientes.find(c=>c.id===id);}
function srv(id){return DB.servicos.find(s=>s.id===id);}
function cliName(a){return a.clienteId?((cli(a.clienteId)||{}).nome||'Cliente removida'):(a.nomeAvulso||'—');}
function cliPhone(a){const c=a.clienteId&&cli(a.clienteId);return c?(c.whats||c.tel||''):'';}
const STATUS={agendado:['Agendado','#b76e79'],confirmado:['Confirmado','#5fa877'],andamento:['Em andamento','#d9a444'],concluido:['Concluído','#7d8a96'],cancelado:['Cancelado','#c25b5b'],falta:['Falta','#8a5c6b']};
function atColor(a){if(a.status==='cancelado'||a.status==='falta')return STATUS[a.status][1];return (srv(a.servicoId)||{}).cor||'#b76e79';}
function atEnd(a){return toHM(toMin(a.hora)+(+a.dur||60));}
function valorFinal(a){return Math.max(0,(+a.valor||0)-(+a.desconto||0));}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2400);}
function waLink(phone,msg){return 'https://wa.me/'+onlyDigits(phone)+(msg?'?text='+encodeURIComponent(msg):'');}

/* aggregate helpers */
function atsOf(date){return DB.ats.filter(a=>a.data===date&&a.status!=='cancelado');}
function receitaPeriodo(d1,d2){let t=0;DB.ats.forEach(a=>{if(a.pago&&a.pagto&&a.pagto.data>=d1&&a.pagto.data<=d2)t+=+a.pagto.valor||0;});return t;}
function pendentes(){return DB.ats.filter(a=>a.status==='concluido'&&!a.pago);}
function monthRange(y,m){const d1=y+'-'+pad(m+1)+'-01';const last=new Date(y,m+1,0).getDate();return[d1,y+'-'+pad(m+1)+'-'+pad(last)];}
</script>
<script src="app.js"></script>
</body>
</html>
